    <text x="540" y="930" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="150" font-weight="700">82</text>
    <text x="540" y="985" text-anchor="middle" fill="#8892a4" font-family="Arial, sans-serif" font-size="34" font-weight="400">health score</text>
