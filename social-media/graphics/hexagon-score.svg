<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-label="Naviio financial health score hexagon at 82 out of 100 across six metrics">
  <rect width="1080" height="1920" fill="#0a0e1a"/>
  <rect width="1080" height="1920" fill="#0c1426" opacity="0.5"/>

  <g transform="translate(80,150)">
    <rect x="0" y="0" width="58" height="20" rx="4" fill="#3B82F6"/>
    <rect x="34" y="0" width="58" height="20" rx="4" fill="#06d6a0" opacity="0.9"/>
