  <text x="540" y="398" text-anchor="middle" fill="#3B82F6" font-family="Arial, sans-serif" font-size="52" font-weight="700">in one number.</text>

  <g>
    <polygon points="540,540 851.8,720 851.8,1080 540,1260 228.2,1080 228.2,720" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
