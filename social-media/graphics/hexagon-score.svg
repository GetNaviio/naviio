  <text x="540" y="500" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Revenue growth</text>
  <text x="885" y="700" text-anchor="start"  fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Profit margin</text>
  <text x="885" y="1100" text-anchor="start" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Cash flow</text>
  <text x="540" y="1330" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Debt ratio</text>
  <text x="195" y="1100" text-anchor="end"  fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Expense control</text>
