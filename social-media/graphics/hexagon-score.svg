    <line x1="540" y1="900" x2="540" y2="540"   stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="540" y1="900" x2="851.8" y2="720" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="540" y1="900" x2="851.8" y2="1080" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="540" y1="900" x2="540" y2="1260"   stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="540" y1="900" x2="228.2" y2="1080" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="540" y1="900" x2="228.2" y2="720"  stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

    <polygon points="540,594 758.2,774 727.1,1008 540,1188 306.2,1035 337.4,783" fill="#3B82F6" fill-opacity="0.22" stroke="#3B82F6" stroke-width="4"/>
    <g fill="#06d6a0">
