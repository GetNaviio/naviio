<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 48" fill="none">
  <defs>
    <linearGradient id="teal" x1="0" y1="1" x2="0.8" y2="0">
      <stop offset="0%" stop-color="#00B894"/>
      <stop offset="100%" stop-color="#26DEB8"/>
    </linearGradient>
  </defs>

  <!-- Three ascending bar chart bars -->
  <rect x="1"  y="33" width="8" height="14" rx="2" fill="url(#teal)" opacity="0.65"/>
  <rect x="13" y="23" width="8" height="24" rx="2" fill="url(#teal)" opacity="0.82"/>
  <rect x="25" y="13" width="8" height="34" rx="2" fill="url(#teal)"/>

  <!-- M trend line: left peak → valley → right peak -->
  <path d="M5 45 L5 27 L17 37 L29 13" stroke="url(#teal)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow shaft from right peak up-right -->
  <line x1="29" y1="13" x2="50" y2="3" stroke="url(#teal)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arrow head (chevron) -->
  <polyline points="38,2 50,3 49,13" stroke="url(#teal)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
