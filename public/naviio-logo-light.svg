<svg viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Top stripe (blue gradient, widest) -->
  <polygon points="3,13 59,13 65,36 9,36" fill="url(#topGrad)"/>

  <!-- Middle stripe (light gray outlined, visible on white) -->
  <polygon points="11,39 53,39 58,58 16,58" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>

  <!-- Bottom stripe (cyan, narrowest) -->
  <polygon points="19,61 44,61 48,77 23,77" fill="#22D3EE"/>

  <!-- Vertical separator -->
  <line x1="75" y1="8" x2="75" y2="92" stroke="#94A3B8" stroke-width="0.9"/>

  <!-- "Naviio" text in dark navy -->
  <text
    x="86" y="69"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="700"
    fill="#0F172A"
    letter-spacing="-1"
  >Naviio</text>

  <!-- Colored dots above the two i's (4th and 5th characters) -->
  <!-- N≈40 a≈31 v≈33 → first-i center ≈ 86+104+8 = 198 -->
  <circle cx="198" cy="16" r="5.5" fill="#2563EB"/>
  <!-- second-i follows first-i by ~17px -->
  <circle cx="216" cy="15" r="6.2" fill="#38BDF8"/>
</svg>
